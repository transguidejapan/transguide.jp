{{- $alt := .PlainText | safeHTML -}}
{{- $dest := .Destination -}}
{{- $isLocal := not (urls.Parse $dest).Scheme -}}
{{- if and $dest $isLocal (hasPrefix $dest "/") -}}
  {{- $dest = (relURL (strings.TrimPrefix "/" $dest)) -}}
{{- end -}}
{{- with .Title -}}
  <figure>
    <img src="{{ $dest | safeURL }}" alt="{{ $alt }}" title="{{ . }}" loading="lazy">
    <figcaption>{{ . }}</figcaption>
  </figure>
{{- else -}}
  <img src="{{ $dest | safeURL }}" alt="{{ $alt }}" loading="lazy">
{{- end -}}
