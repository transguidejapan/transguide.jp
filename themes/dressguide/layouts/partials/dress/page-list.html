{{ with .Pages.ByTitle }}
  <section aria-label="Pages">
    <ul>
      {{ range . }}
        <li>
          <article>
            <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
            {{ with .Description }}<p>{{ . }}</p>{{ end }}
            {{ partial "dress/resource-meta.html" . }}
          </article>
        </li>
      {{ end }}
    </ul>
  </section>
{{ end }}
