baseURL: https://next.transguide.jp/
languageCode: en-us
title: transguide.jp
contentDir: content
module:
  imports:
    - path: github.com/imfing/hextra
ignoreFiles:
  - '(^|/)README\.md$'
  - "(^|/)templates(/|$)"
  - "(^|/)scripts(/|$)"
  - '(^|/)\.github(/|$)'
  - '(^|/)\.pages\.yml$'
  - '(^|/)\.gitignore$'

menu:
  main:
    - identifier: home
      name: Home
      pageRef: /
      weight: 1
    - identifier: resources
      name: Resources
      pageRef: /docs
      weight: 2
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 3
    - identifier: contact
      name: Contact
      url: mailto:transguidejapan@gmail.com
      weight: 4
      params:
        icon: mail
    - name: Search
      weight: 5
      params:
        type: search
  footer:
    - identifier: contact
      name: Contact
      url: mailto:transguidejapan@gmail.com
      weight: 1
    - identifier: back-to-top
      name: Back to top
      url: "#"
      weight: 2

params:
  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo.svg
      link: /
      width: 100
      height: 100
  page:
    width: wide
  imageZoom:
    enable: true
  menu:
    resources:
      - Hair
      - Nails
      - Clothing
      - Bars
      - Medical Care
languages:
  en:
    weight: 1
    languageName: English
  ja:
    weight: 1
    languageName: 日本語
