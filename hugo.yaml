baseURL: https://next.transguide.jp/
languageCode: en-us
title: transguide.jp
theme: dress
contentDir: content
ignoreFiles:
  - '(^|/)README\.md$'
  - "(^|/)templates(/|$)"
  - "(^|/)scripts(/|$)"
  - '(^|/)\.github(/|$)'
  - '(^|/)\.pages\.yml$'
  - '(^|/)\.gitignore$'

menu:
  main:
    - identifier: home
      name: Home
      pageRef: /
      weight: 1
    - identifier: resources
      name: Resources
      pageRef: /docs
      weight: 2
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 3
    - identifier: contact
      name: Contact
      url: mailto:transguidejapan@gmail.com
      weight: 4
      params:
        icon: mail
  footer:
    - identifier: contact
      name: Contact
      url: mailto:transguidejapan@gmail.com
      weight: 1
    - identifier: back-to-top
      name: Back to top
      url: "#"
      weight: 2

params:
  dress:
    logo:
      src: images/logo.svg
      width: 100
      height: 100
      alt: ""
    favicons:
      - href: favicon.ico
        sizes: any
      - href: favicon.svg
        type: image/svg+xml
      - rel: apple-touch-icon
        href: apple-touch-icon.png
  menu:
    resources:
      - Hair
      - Nails
      - Clothing
      - Bars
      - Medical Care
languages:
  en:
    weight: 1
    languageName: English
  ja:
    weight: 1
    languageName: 日本語
